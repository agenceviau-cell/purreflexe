<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" role="img" aria-label="PUR FlashClean logo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');
    </style>

    <!-- Dégradé pour la marque -->
    <radialGradient id="markGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#5a9469"/>
      <stop offset="100%" stop-color="#3a6245"/>
    </radialGradient>

    <!-- Ombre portée sur la marque -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4a7c59" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ═══ MARQUE : Cercle + Goutte ═══ -->
  <g filter="url(#shadow)">
    <!-- Cercle principal -->
    <circle cx="50" cy="50" r="48" fill="url(#markGrad)"/>

    <!-- Anneau intérieur subtil -->
    <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- Goutte blanche (teardrop vers le haut) -->
    <path d="M50,16 C72,28 74,52 50,70 C26,52 28,28 50,16 Z" fill="white"/>

    <!-- Reflet sur la goutte (lumière en haut à gauche) -->
    <ellipse cx="40" cy="30" rx="6" ry="9" fill="white" opacity="0.30" transform="rotate(-20,40,30)"/>

    <!-- Micro-point brillant (spéculaire) -->
    <circle cx="37" cy="23" r="2.5" fill="white" opacity="0.5"/>
  </g>

  <!-- ═══ WORDMARK : PUR ═══ -->
  <text
    x="118" y="62"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="52"
    fill="#1c1c1c"
    letter-spacing="4"
  >PUR</text>

  <!-- Ligne séparatrice fine -->
  <line x1="118" y1="70" x2="308" y2="70" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ═══ TAGLINE : FLASHCLEAN™ ═══ -->
  <text
    x="119" y="84"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="11"
    fill="#4a7c59"
    letter-spacing="6"
  >FLASHCLEAN™</text>
</svg>
